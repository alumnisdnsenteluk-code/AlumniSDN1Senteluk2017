<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri - Alumni SDN 1 Senteluk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <style>
    .album-card {
      height: 250px;
      transition: all 0.3s ease;
    }
    .album-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .album-img {
      height: 200px;
      object-fit: cover;
      border-radius: 15px 15px 0 0;
    }
    .grid-container {
      --gap: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--gap);
    }
    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }
  </style>
</head>
<body data-theme="light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold glass-text" href="index.html">
        <i class="bi bi-building-school"></i> Alumni SDN 1 Senteluk
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link glass-text active" href="index.html">Beranda</a>
          </li>
          <li class="nav-item">
            <a class="nav-link glass-text" href="gallery.html">Galeri</a>
          </li>
          <li class="nav-item">
            <a class="nav-link glass-text" href="datasiswa.html">Data Siswa</a>
          </li>
          <li class="nav-item dropdown">
            <button class="btn glass btn-sm ms-2" id="darkToggle">
              <i class="bi bi-moon"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header Filter -->
  <header class="py-5 glass text-center" style="background: var(--bg-gradient); color: var(--text-primary);">
    <div class="container">
      <h1 class="display-4 fw-bold mb-3 glass-text">
        <i class="bi bi-images"></i> Galeri Album
      </h1>
      <p class="lead mb-4 glass-text">Semua foto & video dari semua tahun - klik folder untuk filter. Tekan DOWNLOAD untuk simpan!</p>
      <div class="row justify-content-center g-3">
        <div class="col-auto">
          <button class="btn btn-lg glass px-4 py-2 fw-bold album-filter active" data-album="all" style="border: 2px solid var(--glass-border); color: var(--text-primary);">
            <i class="bi bi-grid-3x3-gap me-2"></i>Semua Album
          </button>
        </div>
        <div class="col-auto">
          <button class="btn btn-lg glass px-4 py-2 fw-bold album-filter" data-album="2026" style="border: 2px solid var(--glass-border); color: var(--text-primary);">
            <i class="bi bi-calendar-event me-2"></i>Album 2026
          </button>
        </div>
        <div class="col-auto">
          <button class="btn btn-lg glass px-4 py-2 fw-bold album-filter" data-album="2017" style="border: 2px solid var(--glass-border); color: var(--text-primary);">
            <i class="bi bi-calendar3 me-2"></i>Album 2017
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Grid -->
  <section class="py-5">
    <div class="container">
      <div id="albumGrid" class="grid-container">
        <!-- Auto populated cards by js/gallery.js -->
      </div>
    </div>
  </section>

  <!-- Fullscreen Modal -->
  <div class="modal fade" id="fullscreenModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
  <div class="modal-content border-0 p-0" style="background: var(--bg-primary);">
        <div class="d-flex align-items-center justify-content-center h-100 position-relative p-4">
          <button class="position-absolute top-20px start-20px btn glass-text rounded-circle shadow-lg p-3" onclick="changeImage(-1)">
            <i class="bi bi-chevron-left fs-1"></i>
          </button>
          <img id="modalImg" class="img-fluid max-w-95 max-h-95 object-fit-contain d-none" alt="Fullscreen">
          <video id="modalVid" class="img-fluid max-w-95 max-h-95 object-fit-contain d-none" controls preload="metadata"></video>
          <button class="position-absolute top-20px end-20px btn glass-text rounded-circle shadow-lg p-3" onclick="changeImage(1)">
            <i class="bi bi-chevron-right fs-1"></i>
          </button>
          <button class="position-absolute top-20px end-120px btn btn-success rounded-circle shadow-lg p-3" onclick="downloadImage()">
            <i class="bi bi-download fs-4"></i>
          </button>
          <button class="btn btn-success position-absolute bottom-30px start-50 translate-middle-x rounded-pill px-4 py-2 shadow-lg z-3" onclick="downloadImage()" title="Download">
            <i class="bi bi-download me-2"></i>DOWNLOAD
          </button>
          <button class="position-absolute top-20px end-60px btn glass rounded-circle shadow-lg p-3" data-bs-dismiss="modal" title="Close">
            <i class="bi bi-x-lg fs-4"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/album-data.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
