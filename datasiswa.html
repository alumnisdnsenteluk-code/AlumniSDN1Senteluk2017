<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Siswa - Alumni SDN 1 Senteluk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- XLSX for Excel fallback -->
</head>
<body data-theme="light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg glass fixed-top" id="navbar">
    <div class="container">
      <a class="navbar-brand fw-bold glass-text" href="index.html">
        <i class="bi bi-school"></i> Alumni SDN 1 Senteluk
      </a>
      <button class="navbar-toggler border-0 glass" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link glass-text" href="index.html">Beranda</a></li>
          <li class="nav-item"><a class="nav-link glass-text" href="gallery.html">Galeri</a></li>
          <li class="nav-item"><a class="nav-link active glass-text" href="datasiswa.html">Data Siswa</a></li>
          <li class="nav-item">
            <button class="btn glass btn-sm ms-2" id="darkToggle">
              <i class="bi bi-moon"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <section class="py-5 text-center hero" style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), var(--bg-gradient) center/cover; min-height: 70vh; display: flex; align-items: center;">
    <div class="container">
      <h1 class="display-3 fw-bold mb-4 glass-text" data-aos="fade-down">Data Siswa Alumni</h1>
      <p class="lead mb-5 glass-text" data-aos="fade-up">Daftar lengkap alumni SDN 1 Senteluk</p>
      <!-- Auto-load on page load -->
      <div class="glass p-4 rounded-3 mb-5">
        <i class="bi bi-file-earmark-spreadsheet-fill display-4 text-primary mb-3"></i>
      <h4 class="glass-text">Data alumni dapat di perbarui dengan file excellnya</h4>
<button class="btn btn-success btn-sm mt-2" onclick="loadExcelData()">
  <i class="bi bi-arrow-clockwise"></i> Reload Excel
</button>
      </div>
    </div>
  </section>

  <!-- Search -->
  <section class="py-4">
    <div class="container">
      <div class="row">
        <div class="col-md-6 mx-auto">
          <div class="input-group glass rounded-pill shadow-lg overflow-hidden">
            <span class="input-group-text glass px-4 border-0">
              <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control border-0 glass-text bg-transparent px-4" id="searchSiswa" placeholder="Cari nama siswa...">
            <button class="btn glass px-4 border-0" id="clearSearch">
              <i class="bi bi-x-circle"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Siswa Grid -->
  <section class="py-5">
    <div class="container">
      <div class="row g-4" id="siswaGrid">
        <!-- Dynamic cards -->
      </div>
      <div id="loadingSiswa" class="text-center py-5 d-none">
        <div class="spinner-border text-primary glass" style="width: 4rem; height: 4rem;" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 glass-text">Memuat data Excel...</p>
      </div>
    </div>
  </section>

  <!-- Scroll Top -->
  <button class="btn glass rounded-circle scroll-top d-none" id="scrollTop">
    <i class="bi bi-arrow-up"></i>
  </button>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/datasiswa.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
